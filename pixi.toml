[workspace]
name = "road-network-resilience"
channels = ["conda-forge"]
platforms = ["osx-arm64", "win-64"]

[dependencies]
python = "3.12.*"
pandas = ">=2.2"
numpy = ">=1.26"
networkx = ">=3.3"
plotly = ">=5.22"
scipy = ">=1.13"
nbformat = ">=5.10"
jupyter = ">=1.0"
ipykernel = ">=6.29"
jupyter-cache = ">=1.0.1,<2"
matplotlib = ">=3.8"
python-kaleido = ">=0.2"
osmnx = ">=2.0"
geopandas = ">=1.0"
shapely = ">=2.0"

[tasks]
render     = "quarto render road-network-resilience.qmd"
render-pdf = "quarto render road-network-resilience.qmd --to pdf"
preview    = "quarto preview road-network-resilience.qmd"